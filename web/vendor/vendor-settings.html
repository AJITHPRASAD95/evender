<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Shop profile</title><link rel="stylesheet" href="../shared/styles.css"></head><body><div class="shell"><aside class="side" id="sidebar"></aside><main class="main"><header class="top"><div><h1>Shop profile & location</h1><p class="muted">Keep customer-facing details and delivery coverage accurate.</p></div></header><form class="card" style="max-width:850px" onsubmit="saveVendorProfile(event)"><h2>Business information</h2><div class="form-grid"><label>Owner name<input id="ownerName" name="ownerName" required></label><label>Shop name<input id="shopName" name="shopName" required></label><label>Email<input id="email" name="email" type="email"></label><label>Shop availability<select id="isOpen" name="isOpen"><option value="true">Open and accepting orders</option><option value="false">Temporarily closed</option></select></label></div><label>Full address<textarea id="address" name="address" rows="3"></textarea></label><h2>Delivery location</h2><p class="muted">Paste coordinates from Google Maps. Customers inside this radius will see your shop.</p><div class="form-grid"><label>Latitude<input id="latitude" name="latitude" type="number" step="any" required></label><label>Longitude<input id="longitude" name="longitude" type="number" step="any" required></label><label>Delivery radius (km)<input id="deliveryRadiusKm" name="deliveryRadiusKm" type="number" min="1" required></label><label>Minimum order value<input id="minimumOrderValue" name="minimumOrderValue" type="number" min="0"></label></div><p id="save-message" class="notice"></p><button class="btn">Save shop profile</button></form></main></div><script src="../shared/app.js"></script><script>sidebar.innerHTML=navVendor('settings');loadVendorProfile().catch(e=>alert(e.message))</script></body></html>
