<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Add product</title><link rel="stylesheet" href="../shared/styles.css"></head><body><div class="shell"><aside class="side"><div class="brand">FreshLane</div><nav class="nav"><a href="vendor-dashboard.html">Overview</a><a class="active" href="vendor-products.html">Products</a><a href="vendor-orders.html">Orders</a></nav></aside><main class="main"><h1>Add product</h1><form class="card" style="max-width:650px;margin-top:20px" onsubmit="addProduct(event)"><label>Name<input name="name" required></label><label>Category<input name="category"></label><label>Description<textarea name="description"></textarea></label><label>Product image URL<input name="imageUrl" type="url" placeholder="https://example.com/product.jpg" oninput="previewProductImage(this.value)"></label><img id="image-preview" class="product-preview" alt="Product preview" hidden><div class="grid"><label>Price<input name="price" type="number" min="0" step=".01" required></label><label>Offer price<input name="offerPrice" type="number" min="0" step=".01"></label><label>Stock<input name="stockQuantity" type="number" min="0" required></label><label>Unit<select name="unit"><option>kg</option><option>g</option><option>piece</option><option>packet</option><option>litre</option></select></label></div><button class="btn">Save product</button></form></main></div><script src="../shared/app.js"></script></body></html>
