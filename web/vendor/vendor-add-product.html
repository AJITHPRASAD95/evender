<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Add product</title><link rel="stylesheet" href="../shared/styles.css"></head><body><div class="shell"><aside class="side" id="sidebar"></aside><main class="main"><header class="top"><div><h1>Add a product</h1><p class="muted">Create a clear, customer-friendly catalogue listing.</p></div><a class="btn ghost" href="vendor-products.html">← Products</a></header><form class="card" style="max-width:850px" onsubmit="addProduct(event)"><p class="error"></p><div class="form-grid"><label>Product name<input name="name" placeholder="e.g. Fresh Milk Bread" required></label><label>Category<input name="category" placeholder="e.g. Bakery"></label></div><label>Description<textarea name="description" rows="3" placeholder="Describe quality, pack size and key details"></textarea></label><div class="form-grid"><label>Product image URL<input name="imageUrl" type="url" placeholder="https://example.com/product.jpg" oninput="previewProductImage(this.value)"></label><div><img id="image-preview" class="product-preview" alt="Product preview" hidden></div></div><div class="form-grid"><label>MRP / regular price<input name="price" type="number" min="0" step=".01" required></label><label>Offer price<input name="offerPrice" type="number" min="0" step=".01"></label><label>Stock quantity<input name="stockQuantity" type="number" min="0" required></label><label>Unit<select name="unit"><option>kg</option><option>g</option><option>piece</option><option>packet</option><option>litre</option></select></label></div><div class="notice">Tip: use a square, well-lit product image for the best customer experience.</div><button class="btn">Save and publish product</button></form></main></div><script src="../shared/app.js"></script><script>sidebar.innerHTML=navVendor('products')</script></body></html>
