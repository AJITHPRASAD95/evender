<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>FreshLane customer</title><link rel="stylesheet" href="customer.css"></head><body class="auth-page"><main class="auth-card"><div class="logo">FreshLane</div><h1>Groceries from every nearby shop</h1><p class="error"></p><h2>Customer sign in</h2><form onsubmit="customerLogin(event)"><label>Phone<input id="login-phone" name="phone" required></label><label>Password<input name="password" type="password" required></label><button class="btn">Sign in</button></form><hr style="margin:25px 0;border:0;border-top:1px solid #eee"><h2>Create account</h2><form onsubmit="customerRegister(event)"><label>Name<input name="name" required></label><label>Phone<input name="phone" required></label><label>Email<input name="email" type="email"></label><label>Password<input name="password" type="password" minlength="6" required></label><button class="btn secondary">Register</button></form></main><script src="customer.js"></script></body></html>
