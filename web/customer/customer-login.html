<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Join FreshLane</title><link rel="stylesheet" href="customer.css"></head><body class="auth-page"><main class="auth-shell"><section class="auth-visual"><a class="logo" style="color:#fff" href="customer-home.html"><span class="logo-mark" style="background:#fff;color:#14864f">F</span>FreshLane</a><div><span class="eyebrow">HYPERLOCAL, MADE SIMPLE</span><h1>One login. Every shop nearby.</h1><p>Build a single cart across your favourite neighbourhood stores.</p></div><p>Fast · Fresh · Local</p></section><section class="auth-card-wrap"><div class="auth-card"><a class="logo" href="customer-home.html">FreshLane</a><p class="error"></p><h2>Welcome back</h2><form onsubmit="customerLogin(event)"><label>Phone number<input id="login-phone" name="phone" placeholder="Your mobile number" required></label><label>Password<input name="password" type="password" placeholder="Your password" required></label><button class="btn" style="width:100%">Sign in</button></form><hr><h2>New to FreshLane?</h2><form onsubmit="customerRegister(event)"><label>Full name<input name="name" required></label><label>Phone number<input name="phone" required></label><label>Email address<input name="email" type="email"></label><label>Create password<input name="password" type="password" minlength="6" required></label><button class="btn secondary" style="width:100%">Create free account</button></form></div></section></main><script src="customer.js"></script></body></html>
